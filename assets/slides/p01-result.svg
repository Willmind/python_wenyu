      fill="none"
      stroke="#f03b2f"
      stroke-width="4"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <g transform="translate(0 0)">
      <ellipse cx="0" cy="0" rx="9" ry="5.5" fill="#1f2937" />
      <circle cx="9" cy="0" r="3.4" fill="#1f2937" />
      <circle cx="-7" cy="-5" r="2.2" fill="#1f2937" />
      <circle cx="-7" cy="5" r="2.2" fill="#1f2937" />
      <circle cx="2" cy="-6" r="2" fill="#1f2937" />
      <circle cx="2" cy="6" r="2" fill="#1f2937" />
    </g>
  </g>
</svg>
